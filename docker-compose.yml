x-app-image: &app-image
  image: ${APP_IMAGE_NAME:-business-app-starter}:latest
  build:
    context: .
    dockerfile: Dockerfile.app
    target: runner
    args:
      BASE_PATH: ${BASE_PATH}

x-migrate-image: &migrate-image
  image: ${APP_IMAGE_NAME:-business-app-starter}:latest
  build:
    context: .
    dockerfile: Dockerfile.app
    target: migrate-runner
    args:
      BASE_PATH: ${BASE_PATH}

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: business_app_starter
      POSTGRES_USER: starter
      POSTGRES_PASSWORD: starter
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U starter -d business_app_starter"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  migrate:
    <<: *migrate-image
    user: "0:0"
    env_file: .env
    environment:
      NODE_ENV: "production"
      PORT: "3270"
      PRISMA_CONFIG_PATH: "prisma.config.postgres.ts"
    volumes:
      - uploads_data:/app/uploads
    command: >
      sh -c "case \"$DATABASE_URL\" in
      file:*) echo 'Docker Compose requires a PostgreSQL DATABASE_URL in .env. SQLite file URLs are not allowed here.' >&2; exit 1 ;;
      '') echo 'Docker Compose requires DATABASE_URL to be set in .env.' >&2; exit 1 ;;
      esac
      && node scripts/prisma-predeploy-check.js
      && npx prisma migrate deploy --config prisma.config.postgres.ts"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    <<: *app-image
    env_file: .env
    environment:
      NODE_ENV: "production"
      PORT: "3270"
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "${PORT:-3270}:3270"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: >
      sh -c "case \"$DATABASE_URL\" in
      file:*) echo 'Docker Compose requires a PostgreSQL DATABASE_URL in .env. SQLite file URLs are not allowed here.' >&2; exit 1 ;;
      '') echo 'Docker Compose requires DATABASE_URL to be set in .env.' >&2; exit 1 ;;
      esac
      && npm run start"

  worker:
    image: ${WORKER_IMAGE_NAME:-business-app-starter-worker}:latest
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file: .env
    environment:
      WORKER_POLL_INTERVAL_SECONDS: "3"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: >
      sh -c "case \"$DATABASE_URL\" in
      file:*) echo 'Docker Compose requires a PostgreSQL DATABASE_URL in .env. SQLite file URLs are not allowed here.' >&2; exit 1 ;;
      '') echo 'Docker Compose requires DATABASE_URL to be set in .env.' >&2; exit 1 ;;
      esac
      && uv run starter-worker"

volumes:
  postgres_data:
  uploads_data:
