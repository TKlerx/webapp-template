name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run standard validation
        shell: pwsh
        run: ./validate.ps1 all

      - name: Detect E2E specs
        id: detect_e2e
        shell: pwsh
        run: |
          $hasE2E = $false
          if (Test-Path e2e) {
            $hasE2E = [bool](Get-ChildItem e2e -Recurse -Include *.spec.ts,*.spec.tsx -File -ErrorAction SilentlyContinue | Select-Object -First 1)
          }
          if (-not $hasE2E -and (Test-Path tests/e2e)) {
            $hasE2E = [bool](Get-ChildItem tests/e2e -Recurse -Include *.spec.ts,*.spec.tsx -File -ErrorAction SilentlyContinue | Select-Object -First 1)
          }
          "has_e2e=$($hasE2E.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT

      - name: Install Playwright browsers
        if: steps.detect_e2e.outputs.has_e2e == 'true'
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E
        if: steps.detect_e2e.outputs.has_e2e == 'true'
        shell: pwsh
        run: ./validate.ps1 e2e
